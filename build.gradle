plugins {
    id 'java'
}

group   = 'com.sqlburp'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'net.portswigger.burp.extensions:montoya-api:2026.2'
}

jar {
    archiveFileName = 'SQLBurp.jar'
    manifest {
        attributes 'Burp-Extension-Class': 'com.sqlburp.SQLBurp'
    }
}
